name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    # Prevent infinite loop — skip if this is already a build commit
    if: "!startsWith(github.event.head_commit.message, 'build:')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy built files to repo root
        run: |
          cp -r dist/assets ./assets
          cp -r dist/img ./img
          cp dist/index.html ./index.html
          cp dist/404.html ./404.html

      - name: Commit and push built files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html 404.html assets/ img/
          git diff --staged --quiet && echo "Nothing to deploy" || (git commit -m "build: deploy React app" && git push)
